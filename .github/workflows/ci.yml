name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR: xupregistry-ehgfatcvcseycqf4.azurecr.io
  RESOURCE_GROUP: xup_rg

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: xup
      POSTGRES_PASSWORD: ci_password
      SECRET_KEY: ci-secret-key-not-used-in-production
      DATABASE_URL: postgresql+asyncpg://xup:ci_password@localhost:5433/xup

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Start database
        run: docker compose up -d db
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ env.SECRET_KEY }}

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U xup -d xup > /dev/null 2>&1; then
              echo "Database is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Show logs on failure
        if: failure()
        run: docker compose logs db

      - name: Tear down
        if: always()
        run: docker compose down -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build (includes tsc)
        run: npm run build
        working-directory: frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name xupregistry

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ACR }}/backend:${{ github.sha }} -t ${{ env.ACR }}/backend:latest -f backend/Dockerfile .
          docker push ${{ env.ACR }}/backend:${{ github.sha }}
          docker push ${{ env.ACR }}/backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ACR }}/frontend:${{ github.sha }} -t ${{ env.ACR }}/frontend:latest -f frontend/Dockerfile .
          docker push ${{ env.ACR }}/frontend:${{ github.sha }}
          docker push ${{ env.ACR }}/frontend:latest

      - name: Deploy backend
        run: |
          az containerapp update \
            --name xup-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/backend:${{ github.sha }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name xup-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/frontend:${{ github.sha }}
