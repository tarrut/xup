server {
    listen 80;

    resolver RESOLVER_PLACEHOLDER valid=30s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/(auth|parties|challenge)(/.*)?$ {
        set $backend "BACKEND_PLACEHOLDER";
        proxy_pass $backend$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Proxy-Upstream $upstream_addr always;
        add_header X-Proxy-Status $upstream_status always;
    }

    location /ws/ {
        set $backend "BACKEND_PLACEHOLDER";
        proxy_pass $backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
    }
}
