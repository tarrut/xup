<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>{% block title %}XUP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'xup-purple': '#7c3aed',
            'xup-pink': '#ec4899',
          },
          animation: {
            'spin-slow': 'spin 2s linear infinite',
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
            slideUp: { from: { transform: 'translateY(100%)' }, to: { transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>
  <style>
    @keyframes coinSpin {
      0%   { transform: rotateY(0deg) scale(1); }
      40%  { transform: rotateY(720deg) scale(1.3); }
      80%  { transform: rotateY(1440deg) scale(1.1); }
      100% { transform: rotateY(1800deg) scale(1); }
    }
    .coin-spin { animation: coinSpin 2.2s cubic-bezier(0.17, 0.67, 0.35, 1.0) forwards; }

    @keyframes resultPop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-pop { animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    body { -webkit-tap-highlight-color: transparent; }
    input, button { -webkit-appearance: none; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">
  {% if request.url.path not in ['/login', '/register'] %}
  <nav class="flex items-center justify-between px-4 py-3 border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-10">
    <a href="/" class="text-xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent tracking-tight">XUP 🎲</a>
    {% if user is defined %}
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-400">{{ user.username }}</span>
      <form method="post" action="/logout">
        <button class="text-xs text-gray-500 hover:text-gray-300 transition-colors px-2 py-1 rounded border border-gray-700 hover:border-gray-500">
          Logout
        </button>
      </form>
    </div>
    {% endif %}
  </nav>
  {% endif %}

  <main class="flex-1 flex flex-col">
    {% block content %}{% endblock %}
  </main>

  <!-- Coin flip overlay (hidden by default) -->
  <div id="flip-overlay" class="hidden fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-6">
    <div id="flip-inner" class="flex flex-col items-center gap-6 w-full max-w-sm">
      <p class="text-gray-400 text-sm uppercase tracking-widest font-semibold">Coin Flip</p>
      <div id="coin-container" class="flex flex-col items-center gap-2">
        <div id="coin" class="w-28 h-28 rounded-full flex items-center justify-center text-5xl bg-gradient-to-br from-yellow-300 via-yellow-400 to-amber-500 shadow-[0_0_40px_rgba(234,179,8,0.4)]">
          🪙
        </div>
      </div>
      <div id="flip-result" class="hidden text-center result-pop">
        <p id="flip-winner-text" class="text-3xl font-black"></p>
        <p id="flip-detail-text" class="text-gray-400 mt-2"></p>
      </div>
      <button id="flip-dismiss" class="hidden mt-4 w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-pink-600 font-bold text-white text-lg active:scale-95 transition-transform" onclick="dismissFlip()">
        OK 🤙
      </button>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-16 right-4 z-40 flex flex-col gap-2 pointer-events-none max-w-xs w-full"></div>

  {% block scripts %}{% endblock %}
</body>
</html>
